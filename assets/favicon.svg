<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book shape -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="url(#bookGradient)" />
  
  <!-- Book spine -->
  <line x1="50" y1="20" x2="50" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Pages lines -->
  <line x1="30" y1="35" x2="45" y2="35" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="30" y1="45" x2="45" y2="45" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="55" x2="45" y2="55" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <line x1="55" y1="35" x2="70" y2="35" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="55" y1="45" x2="70" y2="45" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="55" y1="55" x2="70" y2="55" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
